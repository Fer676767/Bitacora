      .semana{
      background-color: #ffffff; /* Fondo blanco para la tarjeta */
  border-radius: 12px;       /* Bordes redondeados elegantes */
  padding: 20px;             /* Espacio dentro de la tarjeta */
  margin: 20px 0;            /* Espacio entre tarjetas */
  
  /* Sombra suave para dar profundidad */
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  
  /* Borde sutil para definir la forma */
  border: 1px solid #e1e1e1;
  
  /* Transición suave para cuando interactuemos con ella */
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  
  max-width: 600px;          /* Ancho máximo sugerido */
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #333;               /* Color de texto oscuro para lectura clara */}

  .semana:hover{
  transform: translateY(-5px); /* Se eleva ligeramente */
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15); /* La sombra se intensifica */
  border-color: #bc13fe; /* El borde cambia al morado de tu logo */
}

      .logo3{
    width: 200px; /* Ajusta al tamaño de tu logo */
    transition: transform 0.3s ease; /* Controla la velocidad (0.3 segundos) */
    cursor: pointer;}

  /* El efecto ocurre cuando pasas el mouse (hover) */
  .logo3:hover{
    transform: scale(1.1); /* 1.1 = 110% de su tamaño original */}

      h1{
      color: #fff;
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            
            /* El truco del neón: múltiples capas de sombra */
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #13feb0,
                0 0 82px #13feb0,
                0 0 92px #13feb0,
                0 0 102px #13feb0,
                0 0 151px #13feb0;
            
            /* Animación opcional para darle vida */
            transition: all 0.3s ease;}

            h1:hover{
      color: #ffffff;
